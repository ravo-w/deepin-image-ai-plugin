name: Build Linglong Package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linglong Builder (using Aliyun mirror)
        run: |
          # 使用阿里云镜像源，解决 NOSPLIT 网络问题
          echo "deb [trusted=yes] http://mirrors.aliyun.com/deepin/ beige main" | sudo tee /etc/apt/sources.list.d/deepin.list
          sudo apt update
          sudo apt install -y linglong-builder

      - name: Build Linglong Package
        run: |
          ll-builder build
          ll-builder export --layer
          
          # 将生成的 .layer 文件移动到根目录，方便上传
          find . -name "*.layer" -exec mv {} . \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepin-image-ai-plugin
          path: ./*.layer
