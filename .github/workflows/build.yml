name: Build Linglong Package in Docker

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: deepin-community/ll-builder:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Linglong Package
        run: |
          # 进入包含 linglong.yaml 的目录（这里是仓库根目录）
          cd $GITHUB_WORKSPACE
          # 执行构建命令
          ll-builder build
          # 导出 .layer 文件
          ll-builder export --layer
          
          # 将生成的 .layer 文件移动到根目录，方便上传
          find . -name "*.layer" -exec mv {} . \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepin-image-ai-plugin
          path: ./*.layer
