name: Build Linglong Package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install linglong-builder
        run: |
          # 添加 deepin 软件源
          wget -qO- https://packages.deepin.com/deepin/KEY.gpg | sudo gpg --dearmor | sudo tee /usr/share/keyrings/deepin-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/deepin-archive-keyring.gpg] https://packages.deepin.com/deepin beige main" | sudo tee /etc/apt/sources.list.d/deepin.list
          sudo apt update
          sudo apt install -y linglong-builder

      - name: Build Linglong Package
        run: |
          ll-builder build
          ll-builder export --layer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepin-image-ai-plugin
          path: ./*.layer
