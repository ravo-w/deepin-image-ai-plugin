name: Build Linglong Package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and install linglong-builder
        run: |
          # 直接从 Deepin 官方软件源下载 linglong-builder 的 .deb 包
          wget http://packages.deepin.com/deepin/pool/main/l/linglong/linglong-builder_1.4.3-1_amd64.deb
          sudo dpkg -i linglong-builder_1.4.3-1_amd64.deb
          # 如果安装过程中提示依赖缺失，尝试自动修复
          sudo apt-get install -f -y

      - name: Build Linglong Package
        run: |
          ll-builder build
          ll-builder export --layer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepin-image-ai-plugin
          path: ./*.layer
