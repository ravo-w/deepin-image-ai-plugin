name: Build Linglong Package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: deepin-community/linglong-builder:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Linglong Package
        run: |
          ll-builder build
          ll-builder export --layer
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepin-image-ai-plugin
          path: ./*.layer
