name: Build Linglong Package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ll-builder from Linglong CI Repo
        run: |
          # 关键步骤：添加并信任玲珑 (Linyaps) 官方为 Ubuntu 提供的 CI 软件源
          echo "deb [trusted=yes] https://ci.deepin.com/repo/obs/linglong:/CI:/release/xUbuntu_22.04/ ./" | sudo tee /etc/apt/sources.list.d/linglong.list
          sudo apt update
          # 安装完整工具链，确保后续构建无依赖问题
          sudo apt install -y linglong-builder linglong-box linglong-bin

      - name: Build Linglong Package
        run: |
          ll-builder build
          ll-builder export --layer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepin-image-ai-plugin
          path: ./*.layer
